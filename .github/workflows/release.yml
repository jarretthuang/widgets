name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Use npm 10
        run: npm install -g npm@10.9.8

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: CUJ E2E smoke test (Chromium)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
